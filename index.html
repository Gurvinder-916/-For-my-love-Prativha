<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For My Prativha</title>
    <style>
        body, html { margin: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #wrapper { 
            height: 100%; display: flex; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4); transition: background 1s ease;
            position: relative;
        }
        .card { background: rgba(255, 255, 255, 0.95); padding: 50px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); max-width: 600px; z-index: 10; position: relative; }
        h1 { color: #d63384; font-size: 2em; }
        .buttons { margin-top: 30px; display: flex; justify-content: center; gap: 20px; align-items: center; height: 50px; }
        button { padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #yesBtn { background: #d63384; color: white; font-size: 1.2em; }
        #noBtn { background: #e0e0e0; color: #555; position: absolute; }
        .emoji { position: absolute; font-size: 2rem; z-index: 1; pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="wrapper">
        <div class="card">
            <h1 id="message">Prativha, my Baby, Birdie, Bacha, Jaana, I love you.</h1>
            <div class="buttons">
                <button id="yesBtn" onclick="alert('Yayyy I knew you love me too mwahhhh 💋')">I love you too!</button>
                <button id="noBtn" onmouseover="moveAndShrink()">No</button>
            </div>
        </div>
    </div>

    <script>
        let scaleValue = 1; 
        const emojis = ['❤️', '💖', '🌹', '🥰', '✨', '💌', '🧸', '🦋', '🎈', '💞', '🌸', '💫', '💓', '💕'];
        const messages = [
            "Prativha, my Baby, Birdie, Bacha, Jaana, I love you.",
            "Please, give me another chance? My heart beats only for you.",
            "I know I haven't been perfect, but my love for you is real.",
            "You are my whole world. Please don't say no.",
            "Every sunset reminds me of your smile. I am truly sorry.",
            "I promise to grow and be the partner you deserve.",
            "I miss us so much. Will you forgive me?",
            "My love, you are the best thing that ever happened to me.",
            "I am working on myself because I want to be worthy of you.",
            "I promise to listen better. Please don't push me away.",
            "My love for you grows stronger every single day.",
            "You are the light in my life, Prativha.",
            "I'm sorry for being overpossessive, I’m learning to trust more.",
            "Life is just better when we are together.",
            "Please, just one more chance to show you I've changed.",
            "I love you more than words could ever explain.",
            "You deserve the world, and I want to be the one to give it to you.",
            "My heart only knows how to love you.",
            "Let's start over and make beautiful memories.",
            "I am yours, completely and forever."
        ];
        
        function createEmojis() {
            for (let i = 0; i < 40; i++) {
                const span = document.createElement('span');
                span.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                span.className = 'emoji';
                span.style.left = Math.random() * 100 + 'vw';
                span.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(span);
            }
        }
        createEmojis();

        function moveAndShrink() {
            const msg = document.getElementById('message');
            const noBtn = document.getElementById('noBtn');
            
            msg.innerText = messages[Math.floor(Math.random() * messages.length)];
            
            if (scaleValue > 0.3) scaleValue -= 0.05; 
            noBtn.style.transform = `scale(${scaleValue})`;

            noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
            noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
        }
    </script>
</body>
</html>
